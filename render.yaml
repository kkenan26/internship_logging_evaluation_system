services:
  - type: web
    name: iles-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd BACKEND && gunicorn iles_project.wsgi: application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-url.onrender.com